<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hour Registration</title>
    <link rel="stylesheet" href="/timeregistrering/styles.css">
</head>
<body>
    <div class="container">
        <h1>📊 Hour Registration</h1>

        <div class="controls">
            <div class="control-group">
                <label for="month">Select Month</label>
                <select id="month">
                    <!-- Options will be added by JavaScript -->
                </select>
            </div>
            <div class="control-group">
                <label for="defaultHours">Default Hours (Mon-Fri)</label>
                <input type="number"
                       id="defaultHours"
                       class="hours-preset"
                       min="0"
                       max="24"
                       step="0.5"
                       value="8"
                       placeholder="e.g., 8">
                <button class="prefill-button" type="button" onclick="prefillHours()">Apply to All Weekdays</button>
            </div>
        </div>

        <div class="control-group field-spacing-sm">
            <label for="customerName">Customer</label>
            <input type="text"
                   id="customerName"
                   class="hours-preset"
                   placeholder="e.g., Acme Corp"
                   value="Norgesgruppen">
        </div>

        <div class="control-group field-spacing-lg">
            <label for="projectName">Project Name</label>
            <input type="text"
                   id="projectName"
                   class="hours-preset"
                   placeholder="e.g., Website Redesign"
                   value="Trumf">
        </div>

        <div id="weekContainer" class="week-grid">
            <!-- Weeks will be generated by JavaScript -->
        </div>

        <div class="summary">
            <h2>Total Hours</h2>
            <div class="total-hours" id="totalHours">0</div>
        </div>

        <button class="button" type="button" onclick="generatePDF()">
            📄 Generate PDF
        </button>
    </div>

    <script src="/timeregistrering/jspdf.umd.min.js"></script>
    <script src="/timeregistrering/app.js"></script>
</body>
</html>
